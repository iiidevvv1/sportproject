version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: curling-app
    restart: always
    volumes:
      - db-data:/data
    environment:
      - NODE_ENV=production
      - DB_PATH=/data/curling.db
    expose:
      - "3001"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/games"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nginx:
    image: nginx:1.27-alpine
    container_name: curling-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - letsencrypt:/etc/letsencrypt:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - app-network

volumes:
  db-data:
    driver: local
  letsencrypt:
    driver: local

networks:
  app-network:
    driver: bridge
