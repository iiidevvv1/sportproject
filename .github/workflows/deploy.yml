name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: development
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build project
        run: npm run build

      - name: Notify Telegram - Build Success
        if: success()
        run: |
          curl -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "parse_mode=HTML" \
            -d "disable_web_page_preview=true" \
            -d "text=✅ <b>Build passed!</b> Tests and linter OK. Deploy starting..."
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        continue-on-error: true

      - name: Notify Telegram - Build Failed
        if: failure()
        run: |
          curl -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "parse_mode=HTML" \
            -d "disable_web_page_preview=true" \
            -d "text=❌ <b>Build FAILED!</b>%0ATests or linter failed. Check GitHub Actions logs."
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        continue-on-error: true

  deploy:
    needs: test-and-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Notify Telegram - Deploy Starting
        run: |
          curl -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=🚀 Deploy starting... (commit ${{ github.sha }})"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Deploy to VM
        id: deploy
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_SSH_KEY" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $DEPLOY_HOST >> ~/.ssh/known_hosts 2>/dev/null || true
          
          ssh -i ~/.ssh/deploy_key $DEPLOY_USER@$DEPLOY_HOST 2>&1 | tee /tmp/deploy.log << 'EOF'
          set -ex
          echo "=== Starting deploy ==="
          cd /app
          echo "=== Pulling latest code ==="
          git pull origin main
          echo "=== Installing dependencies ==="
          NODE_ENV=development npm install
          echo "=== Building ==="
          npm run build
          echo "=== Building Docker image ==="
          docker-compose -f docker-compose.prod.yml build --no-cache
          echo "=== Starting containers ==="
          docker-compose -f docker-compose.prod.yml up -d
          echo "✅ Deploy complete"
          EOF
        continue-on-error: true

      - name: Extract error message
        id: error_logs
        run: |
          if [ -f /tmp/deploy.log ]; then
            ERROR_MSG=$(tail -15 /tmp/deploy.log | sed 's/"/\\"/g' | sed "s/'/\\\\'/g")
            ERROR_MSG=$(echo "$ERROR_MSG" | sed ':a;N;$!ba;s/\n/\\n/g')
            echo "error_msg=$ERROR_MSG" >> $GITHUB_OUTPUT
          else
            echo "error_msg=Deployment log not found" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

      - name: Notify Telegram - Deploy Success
        if: steps.deploy.outcome == 'success'
        run: |
          curl -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "parse_mode=HTML" \
            -d "disable_web_page_preview=true" \
            -d "text=✅ <b>Curling app deployed!</b>%0ACommit: <code>${{ github.sha }}</code>%0AURL: kurling.inkpie.ru"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Notify Telegram - Deploy Failed
        if: steps.deploy.outcome == 'failure'
        run: |
          ERROR_MSG="${{ steps.error_logs.outputs.error_msg }}"
          if [ -z "$ERROR_MSG" ]; then
            ERROR_MSG="Deployment failed - check logs"
          fi
          curl -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "parse_mode=HTML" \
            -d "disable_web_page_preview=true" \
            -d "text=❌ <b>Curling deploy FAILED!</b>%0ACommit: <code>${{ github.sha }}</code>%0A%0A<pre>$ERROR_MSG</pre>"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
