name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build project
        run: npm run build

      - name: Build Docker image
        run: docker build -t curling:latest .

      - name: Notify Telegram - Build Started
        run: |
          curl -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=🔄 Curling app: build started (commit ${{ github.sha }})"

      - name: Deploy to VM
        id: deploy
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_SSH_KEY" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $DEPLOY_HOST >> ~/.ssh/known_hosts 2>/dev/null || true
          
          ssh -i ~/.ssh/deploy_key $DEPLOY_USER@$DEPLOY_HOST << 'EOF' 2>&1 | tee /tmp/deploy.log
          set -e
          cd /app
          git pull origin main
          NODE_ENV=development npm install
          npm run build
          docker-compose -f docker-compose.prod.yml pull || true
          docker-compose -f docker-compose.prod.yml up -d
          echo "Deploy complete"
          EOF
        continue-on-error: true
      
      - name: Capture error logs
        if: failure()
        id: error_logs
        run: |
          if [ -f /tmp/deploy.log ]; then
            ERROR_MSG=$(tail -20 /tmp/deploy.log | sed 's/"/\\"/g' | tr '\n' ' ')
            echo "error_msg=$ERROR_MSG" >> $GITHUB_OUTPUT
          else
            echo "error_msg=Unknown error" >> $GITHUB_OUTPUT
          fi

      - name: Notify Telegram - Deploy Success
        if: steps.deploy.outcome == 'success'
        run: |
          curl -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "parse_mode=HTML" \
            -d "disable_web_page_preview=true" \
            -d "text=✅ <b>Curling app deployed!</b>%0ACommit: <code>${{ github.sha }}</code>%0AURL: kurling.inkpie.ru"

      - name: Notify Telegram - Deploy Failed
        if: steps.deploy.outcome == 'failure'
        run: |
          ERROR_MSG="${{ steps.error_logs.outputs.error_msg }}"
          if [ -z "$ERROR_MSG" ]; then ERROR_MSG="Unknown error - check GitHub Actions logs"; fi
          curl -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "parse_mode=HTML" \
            -d "disable_web_page_preview=true" \
            -d "text=❌ <b>Curling deploy FAILED!</b>%0ACommit: <code>${{ github.sha }}</code>%0A%0A<code>$ERROR_MSG</code>"
